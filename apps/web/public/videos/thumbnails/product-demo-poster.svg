<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f0d"/>
      <stop offset="100%" style="stop-color:#0e1a14"/>
    </linearGradient>
    <linearGradient id="grn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27c98a"/>
      <stop offset="100%" style="stop-color:#0c7d54"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Grid dots -->
  <g fill="#1a2e22" opacity="0.4">
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1"/>
    </pattern>
  </g>
  <rect width="1280" height="720" fill="url(#dots)"/>
  <!-- Gauge circle -->
  <circle cx="400" cy="320" r="120" fill="none" stroke="#1a2e22" stroke-width="12"/>
  <circle cx="400" cy="320" r="120" fill="none" stroke="url(#grn)" stroke-width="12" stroke-dasharray="565" stroke-dashoffset="200" stroke-linecap="round" transform="rotate(-90 400 320)"/>
  <circle cx="400" cy="320" r="90" fill="#0a0f0d"/>
  <text x="400" y="305" text-anchor="middle" fill="#e8ede6" font-family="'JetBrains Mono',monospace" font-size="56" font-weight="800">72</text>
  <text x="400" y="338" text-anchor="middle" fill="#5a7064" font-family="'JetBrains Mono',monospace" font-size="16">/ 100</text>
  <!-- Score bars -->
  <g transform="translate(560, 240)">
    <rect x="0" y="0" width="300" height="28" rx="14" fill="#1a2e22"/>
    <rect x="0" y="0" width="180" height="28" rx="14" fill="url(#grn)"/>
    <text x="310" y="19" fill="#e8ede6" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="600">AI · 64</text>
    <rect x="0" y="48" width="300" height="28" rx="14" fill="#1a2e22"/>
    <rect x="0" y="48" width="220" height="28" rx="14" fill="url(#grn)"/>
    <text x="310" y="67" fill="#e8ede6" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="600">Performance · 71</text>
    <rect x="0" y="96" width="300" height="28" rx="14" fill="#1a2e22"/>
    <rect x="0" y="96" width="155" height="28" rx="14" fill="#e6a93f"/>
    <text x="310" y="115" fill="#e8ede6" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="600">Brand · 49</text>
  </g>
  <!-- Competitor cards -->
  <g transform="translate(100, 480)">
    <rect x="0" y="0" width="480" height="50" rx="12" fill="#1f1820"/>
    <text x="20" y="30" fill="#e8ede6" font-family="sans-serif" font-size="15" font-weight="600">Competitor A</text>
    <text x="400" y="30" fill="#f0847c" font-family="'JetBrains Mono',monospace" font-size="13">cited 6 / 10</text>
    <rect x="0" y="60" width="480" height="50" rx="12" fill="#0e1a14"/>
    <text x="20" y="90" fill="#e8ede6" font-family="sans-serif" font-size="15" font-weight="600">Your Brand</text>
    <text x="400" y="90" fill="#27c98a" font-family="'JetBrains Mono',monospace" font-size="13">cited 2 / 10</text>
  </g>
  <!-- Play button -->
  <circle cx="640" cy="360" r="54" fill="url(#grn)" opacity="0.95"/>
  <polygon points="620,335 620,385 665,360" fill="#06140e"/>
  <!-- Label -->
  <text x="640" y="660" text-anchor="middle" fill="#27c98a" font-family="'JetBrains Mono',monospace" font-size="14" letter-spacing="2">▶ OZVOR PRODUCT DEMO</text>
</svg>
