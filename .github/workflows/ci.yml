name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "claude/**"]

# Cancel superseded runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  # Test database (Postgres service container)
  POSTGRES_TEST_URL: "postgres://postgres:test@localhost:5432/organic_posts_test"
  # Test Redis (Redis service container)
  REDIS_TEST_URL: "redis://localhost:6379"
  # Test-mode secrets (safe values — no real external calls)
  OAUTH_TOKEN_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
  DPA_CURRENT_VERSION: "1.0"
  DEFAULT_TENANT_REGION: "us"
  NODE_ENV: "test"

jobs:
  # --------------------------------------------------------------------------
  # Job 1: Lint + Type-check
  # --------------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check (turbo)
        run: npm run lint

      - name: Check for uncommitted generated files
        run: git diff --exit-code

  # --------------------------------------------------------------------------
  # Job 2: Unit + Integration tests (Postgres + Redis services)
  # --------------------------------------------------------------------------
  unit-and-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: organic_posts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ env.POSTGRES_TEST_URL }}

      - name: Run unit and integration tests
        run: npx vitest run --coverage
        env:
          POSTGRES_TEST_URL: ${{ env.POSTGRES_TEST_URL }}
          REDIS_TEST_URL: ${{ env.REDIS_TEST_URL }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # --------------------------------------------------------------------------
  # Job 3: Security checks
  #   - Token-leak grep test (no-token-leak.test.ts)
  #   - RLS assertion via psql against check-rls.sql
  #   - npm audit
  # --------------------------------------------------------------------------
  security:
    name: Security Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: organic_posts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ env.POSTGRES_TEST_URL }}

      - name: RLS assertion — check-rls.sql (S-2 / Gate 5→6 fix)
        run: |
          # Use the real psql client (ubuntu runners ship it) — NOT `npx psql`,
          # which resolves to an unrelated npm package. check-rls.sql lists any
          # tenant table missing RLS; -t -A makes the output a bare list so we
          # can fail the gate when it's non-empty (psql -f alone exits 0).
          missing=$(psql "${{ env.POSTGRES_TEST_URL }}" -t -A -f packages/db/scripts/check-rls.sql)
          if [ -n "$missing" ]; then
            echo "::error::Tables missing ROW LEVEL SECURITY: $missing"
            exit 1
          fi
          echo "RLS enabled on all tenant-scoped tables ✓"
        env:
          PGPASSWORD: test

      - name: Token-leak grep test (S-4)
        run: npx vitest run tests/security/no-token-leak.test.ts
        env:
          POSTGRES_TEST_URL: ${{ env.POSTGRES_TEST_URL }}

      - name: Security headers test (S-13/S-15)
        run: npx vitest run tests/security/security-headers.test.ts

      - name: Prompt injection test (S-5)
        run: npx vitest run tests/security/prompt-injection.test.ts

      - name: npm audit — no high/critical vulnerabilities in PRODUCTION deps (SEC-G7-6)
        # Scope to production dependencies: the deployed artifacts (compiled API/
        # worker, Next standalone build) contain no build/test tooling. The only
        # remaining high/critical advisories are in dev-only tools — vite's dev
        # server and the vitest UI server (neither ever runs in prod or CI test
        # execution) — and their sole "fix" is a breaking next@15→9 downgrade.
        # Production deps (hono, ws, etc.) are patched and audited strictly here.
        run: npm audit --audit-level=high --omit=dev

      - name: Secrets scan — no committed secrets (SEC-G7-6)
        run: |
          # Scan source for hardcoded secret prefixes
          # Patterns: Stripe live/test keys, Stripe webhook secrets, AWS access keys,
          #           generic password / api-key literal assignments
          # (Phrased without the literal "key = value" form so this comment does
          #  not match its own regex when the scan includes workflow .yml files.)
          FOUND=$(grep -rE \
            "sk_live_[A-Za-z0-9]{20,}|sk_test_[A-Za-z0-9]{20,}|whsec_[A-Za-z0-9]{20,}|AKIA[A-Z0-9]{16}|password\s*=\s*[\"'][^\"']{8,}|api_key\s*=\s*[\"'][^\"']{8,}" \
            --include="*.ts" --include="*.js" --include="*.json" --include="*.yml" --include="*.yaml" \
            --exclude-dir=node_modules --exclude-dir=".next" --exclude-dir=dist \
            . 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "ERROR: Potential hardcoded secret found in source:"
            echo "$FOUND"
            exit 1
          fi
          echo "Secrets scan passed — no hardcoded secret prefixes found"

  # --------------------------------------------------------------------------
  # Job 4: Build
  # --------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages and apps
        run: npm run build

      - name: Verify no secrets in build artifacts
        run: |
          # Grep built artifacts for secret prefixes
          ! grep -rE "sk_live_[A-Za-z0-9]|sk_test_[A-Za-z0-9]|whsec_[A-Za-z0-9]|xoxb-[A-Za-z0-9]" \
            apps/web/.next apps/api/dist 2>/dev/null || \
            (echo "ERROR: Secret prefix found in build artifact" && exit 1)

  # --------------------------------------------------------------------------
  # Job 5: Compliance tests (compliance-only Vitest run)
  # --------------------------------------------------------------------------
  compliance:
    name: Compliance Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run compliance integration tests (DPA, CCPA, DSR)
        run: |
          npx vitest run \
            tests/integration/compliance/dpa.test.ts \
            tests/integration/compliance/ccpa.test.ts \
            tests/integration/api/dsr.test.ts

      - name: Run bias baseline (A8)
        run: npx vitest run tests/ai/bias-baseline.spec.ts

      - name: Upload bias baseline report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bias-baseline-report
          path: tests/ai/bias-baseline-report.md
          retention-days: 90

  # --------------------------------------------------------------------------
  # Job 6: Fast smoke gate  (issue #143)
  #   The quick REQUIRED signal that replaces long Playwright E2E as the per-PR
  #   merge-latency gate. Boots the real Hono route layer in-process (app.request)
  #   and asserts routing + auth middleware are wired — no build, no browser, no
  #   DB, no service containers. Target: green in ~1 minute (npm ci + vitest).
  #   Full browser E2E is advisory (manual/nightly/path-filtered) — see e2e.yml.
  # --------------------------------------------------------------------------
  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fast in-process boot + route-wiring smoke
        run: npx vitest run tests/smoke
